services:
  postgres:
    image: postgres:15
    container_name: brentprices_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: brentprices_data
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      
  mongodb:
      image: mongo:6.0
      container_name: brent_mongo
      environment:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: adminpassword
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db

  mongo-express:
      image: mongo-express
      container_name: brent_mongo_express
      restart: always
      ports:
        - "8081:8081"
      environment:
        ME_CONFIG_MONGODB_ADMINUSERNAME: admin
        ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
        ME_CONFIG_MONGODB_URL: mongodb://admin:adminpassword@mongodb:27017/
      depends_on:
        - mongodb

volumes:
  pg_data:
  mongo_data: